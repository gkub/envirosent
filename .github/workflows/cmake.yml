# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build ESP-IDF project (Linux + macOS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Run on both Ubuntu and macOS runners
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # On Ubuntu, use Espressif's Docker-based CI action
      - name: Build with ESP-IDF (Linux, Docker-based)
        if: matrix.os == 'ubuntu-latest'
        uses: espressif/esp-idf-ci-action@v1
        with:
          # ESP-IDF version to use; adjust if your local version differs
          esp_idf_version: v5.2
          # Target chip; change if you're not using plain ESP32
          target: esp32
          # Path to the ESP-IDF project (where CMakeLists.txt with project() lives)
          path: .

      # On macOS, install ESP-IDF natively and build using idf.py
      - name: Install ESP-IDF (macOS)
        if: matrix.os == 'macos-latest'
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.2"

      - name: Build with ESP-IDF (macOS, native)
        if: matrix.os == 'macos-latest'
        run: |
          idf.py set-target esp32
          idf.py build
